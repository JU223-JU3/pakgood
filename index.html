<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>登录 - 选品系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-image: url('黑色背景.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: #64748b;
      font-size: 0.875rem;
    }

    .role-selector {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .role-card {
      flex: 1;
      padding: 1.5rem;
      border: 2px solid #e2e8f0;
      border-radius: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: white;
    }

    .role-card:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.2);
    }

    .role-card.active {
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .role-card.active .role-icon,
    .role-card.active .role-title,
    .role-card.active .role-desc {
      color: white;
    }

    .role-icon {
      font-size: 2rem;
      color: #667eea;
      margin-bottom: 0.75rem;
    }

    .role-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.25rem;
    }

    .role-desc {
      font-size: 0.75rem;
      color: #64748b;
    }

    .login-form {
      display: none;
    }

    .login-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
    }

    .form-input.with-icon {
      padding-left: 2.75rem;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-enter {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }

    .btn-enter:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
    }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .error-message.show {
      display: flex;
    }

    .success-message {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .success-message.show {
      display: flex;
    }



    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.5s ease-in-out;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .login-container {
        padding: 2rem 1.5rem;
        max-width: 100%;
      }

      .role-selector {
        flex-direction: column;
        gap: 0.75rem;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }

      .form-input {
        padding: 0.75rem 1rem;
      }

      .btn {
        padding: 0.875rem;
        font-size: 0.8rem;
      }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 1.5rem 1.25rem;
      }

      .login-header h1 {
        font-size: 1.25rem;
      }

      .login-header p {
        font-size: 0.75rem;
      }

      .role-card {
        padding: 1.25rem;
      }

      .role-icon {
        font-size: 1.75rem;
      }

      .role-title {
        font-size: 0.9rem;
      }

      .role-desc {
        font-size: 0.7rem;
      }

      .form-label {
        font-size: 0.8rem;
      }

      .form-input {
        padding: 0.625rem 0.875rem;
        font-size: 0.8rem;
      }

      .form-input.with-icon {
        padding-left: 2.5rem;
      }

      .btn {
        padding: 0.75rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>欢迎访问</h1>
      <p>请选择您的身份进入系统</p>
    </div>

    <div class="role-selector">
      <div class="role-card active" data-role="owner" onclick="selectRole('owner')">
        <div class="role-icon">
          <i class="fas fa-user"></i>
        </div>
        <div class="role-title">业主</div>
        <div class="role-desc">直接访问清单</div>
      </div>
      <div class="role-card" data-role="admin" onclick="selectRole('admin')">
        <div class="role-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <div class="role-title">后台管理</div>
        <div class="role-desc">账号密码登录</div>
      </div>
    </div>

    <div id="errorMsg" class="error-message">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">账号或密码错误</span>
    </div>

    <div id="successMsg" class="success-message">
      <i class="fas fa-check-circle"></i>
      <span>登录成功，正在跳转...</span>
    </div>

    <div id="ownerSection">
      <div class="form-group">
        <label class="form-label">账号</label>
        <div class="input-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input 
            type="text" 
            id="ownerId" 
            class="form-input with-icon" 
            placeholder="请输入账号"
            autocomplete="username"
          >
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input 
            type="password" 
            id="ownerPassword" 
            class="form-input with-icon" 
            placeholder="请输入密码"
            autocomplete="current-password"
          >
          <i class="fas fa-eye password-toggle" onclick="togglePassword('ownerPassword', this)"></i>
        </div>
      </div>
      <button class="btn btn-primary" onclick="loginAsOwner()">
        <i class="fas fa-sign-in-alt"></i>
        登录
      </button>
    </div>

    <form id="adminForm" class="login-form" onsubmit="handleAdminLogin(event)">
      <div class="form-group">
        <label class="form-label">账号</label>
        <div class="input-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input 
            type="text" 
            id="username" 
            class="form-input with-icon" 
            placeholder="请输入账号"
            autocomplete="username"
          >
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input 
            type="password" 
            id="password" 
            class="form-input with-icon" 
            placeholder="请输入密码"
            autocomplete="current-password"
          >
          <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-sign-in-alt"></i>
        登录
      </button>
    </form>
  </div>

  <script>
    let currentRole = 'owner';

    const ADMIN_CREDENTIALS = {
      username: 'admin',
      passwordHash: '21232f297a57a5a743894a0e4a801fc3'
    };

    function md5(string) {
      function rotateLeft(lValue, iShiftBits) {
        return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
      }

      function addUnsigned(lX, lY) {
        const lX8 = lX & 0x80000000;
        const lY8 = lY & 0x80000000;
        const lX4 = lX & 0x40000000;
        const lY4 = lY & 0x40000000;
        const lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
        if (lX4 & lY4) return lResult ^ 0x80000000 ^ lX8 ^ lY8;
        if (lX4 | lY4) {
          if (lResult & 0x40000000) return lResult ^ 0xC0000000 ^ lX8 ^ lY8;
          return lResult ^ 0x40000000 ^ lX8 ^ lY8;
        }
        return lResult ^ lX8 ^ lY8;
      }

      function f(x, y, z) { return (x & y) | ((~x) & z); }
      function g(x, y, z) { return (x & z) | (y & (~z)); }
      function h(x, y, z) { return x ^ y ^ z; }
      function i(x, y, z) { return y ^ (x | (~z)); }

      function ff(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(f(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
      }

      function gg(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(g(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
      }

      function hh(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(h(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
      }

      function ii(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(i(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
      }

      function convertToWordArray(string) {
        let lWordCount;
        const lMessageLength = string.length;
        const lNumberOfWordsTemp1 = lMessageLength + 8;
        const lNumberOfWordsTemp2 = (lNumberOfWordsTemp1 - (lNumberOfWordsTemp1 % 64)) / 64;
        const lNumberOfWords = (lNumberOfWordsTemp2 + 1) * 16;
        const lWordArray = new Array(lNumberOfWords - 1);
        let lBytePosition = 0;
        let lByteCount = 0;
        while (lByteCount < lMessageLength) {
          lWordCount = (lByteCount - (lByteCount % 4)) / 4;
          lBytePosition = (lByteCount % 4) * 8;
          lWordArray[lWordCount] = lWordArray[lWordCount] | (string.charCodeAt(lByteCount) << lBytePosition);
          lByteCount++;
        }
        lWordCount = (lByteCount - (lByteCount % 4)) / 4;
        lBytePosition = (lByteCount % 4) * 8;
        lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition);
        lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
        lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
        return lWordArray;
      }

      function wordToHex(lValue) {
        let wordToHexValue = '', wordToHexValueTemp = '', lByte, lCount;
        for (lCount = 0; lCount <= 3; lCount++) {
          lByte = (lValue >>> (lCount * 8)) & 255;
          wordToHexValueTemp = '0' + lByte.toString(16);
          wordToHexValue = wordToHexValue + wordToHexValueTemp.substr(wordToHexValueTemp.length - 2, 2);
        }
        return wordToHexValue;
      }

      let x = [];
      let k, AA, BB, CC, DD, a, b, c, d;
      const S11 = 7, S12 = 12, S13 = 17, S14 = 22;
      const S21 = 5, S22 = 9, S23 = 14, S24 = 20;
      const S31 = 4, S32 = 11, S33 = 16, S34 = 23;
      const S41 = 6, S42 = 10, S43 = 15, S44 = 21;

      string = unescape(encodeURIComponent(string));
      x = convertToWordArray(string);
      a = 0x67452301; b = 0xEFCDAB89; c = 0x98BADCFE; d = 0x10325476;

      for (k = 0; k < x.length; k += 16) {
        AA = a; BB = b; CC = c; DD = d;
        a = ff(a, b, c, d, x[k + 0], S11, 0xD76AA478);
        d = ff(d, a, b, c, x[k + 1], S12, 0xE8C7B756);
        c = ff(c, d, a, b, x[k + 2], S13, 0x242070DB);
        b = ff(b, c, d, a, x[k + 3], S14, 0xC1BDCEEE);
        a = ff(a, b, c, d, x[k + 4], S11, 0xF57C0FAF);
        d = ff(d, a, b, c, x[k + 5], S12, 0x4787C62A);
        c = ff(c, d, a, b, x[k + 6], S13, 0xA8304613);
        b = ff(b, c, d, a, x[k + 7], S14, 0xFD469501);
        a = ff(a, b, c, d, x[k + 8], S11, 0x698098D8);
        d = ff(d, a, b, c, x[k + 9], S12, 0x8B44F7AF);
        c = ff(c, d, a, b, x[k + 10], S13, 0xFFFF5BB1);
        b = ff(b, c, d, a, x[k + 11], S14, 0x895CD7BE);
        a = ff(a, b, c, d, x[k + 12], S11, 0x6B901122);
        d = ff(d, a, b, c, x[k + 13], S12, 0xFD987193);
        c = ff(c, d, a, b, x[k + 14], S13, 0xA679438E);
        b = ff(b, c, d, a, x[k + 15], S14, 0x49B40821);
        a = gg(a, b, c, d, x[k + 1], S21, 0xF61E2562);
        d = gg(d, a, b, c, x[k + 6], S22, 0xC040B340);
        c = gg(c, d, a, b, x[k + 11], S23, 0x265E5A51);
        b = gg(b, c, d, a, x[k + 0], S24, 0xE9B6C7AA);
        a = gg(a, b, c, d, x[k + 5], S21, 0xD62F105D);
        d = gg(d, a, b, c, x[k + 10], S22, 0x2441453);
        c = gg(c, d, a, b, x[k + 15], S23, 0xD8A1E681);
        b = gg(b, c, d, a, x[k + 4], S24, 0xE7D3FBC8);
        a = gg(a, b, c, d, x[k + 9], S21, 0x21E1CDE6);
        d = gg(d, a, b, c, x[k + 14], S22, 0xC33707D6);
        c = gg(c, d, a, b, x[k + 3], S23, 0xF4D50D87);
        b = gg(b, c, d, a, x[k + 8], S24, 0x455A14ED);
        a = gg(a, b, c, d, x[k + 13], S21, 0xA9E3E905);
        d = gg(d, a, b, c, x[k + 2], S22, 0xFCEFA3F8);
        c = gg(c, d, a, b, x[k + 7], S23, 0x676F02D9);
        b = gg(b, c, d, a, x[k + 12], S24, 0x8D2A4C8A);
        a = hh(a, b, c, d, x[k + 5], S31, 0xFFFA3942);
        d = hh(d, a, b, c, x[k + 8], S32, 0x8771F681);
        c = hh(c, d, a, b, x[k + 11], S33, 0x6D9D6122);
        b = hh(b, c, d, a, x[k + 14], S34, 0xFDE5380C);
        a = hh(a, b, c, d, x[k + 1], S31, 0xA4BEEA44);
        d = hh(d, a, b, c, x[k + 4], S32, 0x4BDECFA9);
        c = hh(c, d, a, b, x[k + 7], S33, 0xF6BB4B60);
        b = hh(b, c, d, a, x[k + 10], S34, 0xBEBFBC70);
        a = hh(a, b, c, d, x[k + 13], S31, 0x289B7EC6);
        d = hh(d, a, b, c, x[k + 0], S32, 0xEAA127FA);
        c = hh(c, d, a, b, x[k + 3], S33, 0xD4EF3085);
        b = hh(b, c, d, a, x[k + 6], S34, 0x4881D05);
        a = hh(a, b, c, d, x[k + 9], S31, 0xD9D4D039);
        d = hh(d, a, b, c, x[k + 12], S32, 0xE6DB99E5);
        c = hh(c, d, a, b, x[k + 15], S33, 0x1FA27CF8);
        b = hh(b, c, d, a, x[k + 2], S34, 0xC4AC5665);
        a = ii(a, b, c, d, x[k + 0], S41, 0xF4292244);
        d = ii(d, a, b, c, x[k + 7], S42, 0x432AFF97);
        c = ii(c, d, a, b, x[k + 14], S43, 0xAB9423A7);
        b = ii(b, c, d, a, x[k + 5], S44, 0xFC93A039);
        a = ii(a, b, c, d, x[k + 12], S41, 0x655B59C3);
        d = ii(d, a, b, c, x[k + 3], S42, 0x8F0CCC92);
        c = ii(c, d, a, b, x[k + 10], S43, 0xFFEFF47D);
        b = ii(b, c, d, a, x[k + 1], S44, 0x85845DD1);
        a = ii(a, b, c, d, x[k + 8], S41, 0x6FA87E4F);
        d = ii(d, a, b, c, x[k + 15], S42, 0xFE2CE6E0);
        c = ii(c, d, a, b, x[k + 6], S43, 0xA3014314);
        b = ii(b, c, d, a, x[k + 13], S44, 0x4E0811A1);
        a = ii(a, b, c, d, x[k + 4], S41, 0xF7537E82);
        d = ii(d, a, b, c, x[k + 11], S42, 0xBD3AF235);
        c = ii(c, d, a, b, x[k + 2], S43, 0x2AD7D2BB);
        b = ii(b, c, d, a, x[k + 9], S44, 0xEB86D391);
        a = addUnsigned(a, AA);
        b = addUnsigned(b, BB);
        c = addUnsigned(c, CC);
        d = addUnsigned(d, DD);
      }

      const temp = wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d);
      return temp.toLowerCase();
    }

    function selectRole(role) {
      currentRole = role;
      document.querySelectorAll('.role-card').forEach(card => {
        card.classList.remove('active');
      });
      document.querySelector(`[data-role="${role}"]`).classList.add('active');

      if (role === 'owner') {
        document.getElementById('ownerSection').style.display = 'block';
        document.getElementById('adminForm').classList.remove('active');
      } else {
        document.getElementById('ownerSection').style.display = 'none';
        document.getElementById('adminForm').classList.add('active');
      }

      hideMessages();
    }

    function hideMessages() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    function showError(message) {
      document.getElementById('errorText').textContent = message;
      document.getElementById('errorMsg').classList.add('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    function showSuccess() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('successMsg').classList.add('show');
    }

    function togglePassword(inputId, button) {
      const passwordInput = document.getElementById(inputId);
      const toggleIcon = button.querySelector('i');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    function enterAsOwner() {
      window.location.href = '列表清单.html';
    }

    function loginAsOwner() {
      const ownerId = document.getElementById('ownerId').value.trim();
      const password = document.getElementById('ownerPassword').value;
      
      if (!ownerId) {
        showError('请输入业主ID');
        shakeForm();
        return;
      }

      if (!password) {
        showError('请输入密码');
        shakeForm();
        return;
      }

      // 获取业主信息
      const ownerCredentials = JSON.parse(localStorage.getItem('ownerCredentials')) || {};
      
      // 检查业主是否存在
      if (!ownerCredentials[ownerId]) {
        showError('业主ID或密码错误');
        shakeForm();
        return;
      }

      // 验证密码
      const passwordHash = md5(password);
      if (ownerCredentials[ownerId] !== passwordHash) {
        showError('业主ID或密码错误');
        shakeForm();
        return;
      }

      // 保存当前登录的业主ID
      localStorage.setItem('currentOwnerId', ownerId);
      
      showSuccess();
      setTimeout(() => {
        window.location.href = '列表清单.html';
      }, 1000);
    }

    function handleAdminLogin(event) {
      event.preventDefault();
      hideMessages();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username) {
        showError('请输入账号');
        shakeForm();
        return;
      }

      if (!password) {
        showError('请输入密码');
        shakeForm();
        return;
      }

      const passwordHash = md5(password);

      if (username === ADMIN_CREDENTIALS.username && passwordHash === ADMIN_CREDENTIALS.passwordHash) {
        showSuccess();
        setTimeout(() => {
          window.location.href = '后台管理.html';
        }, 1000);
      } else {
        showError('账号或密码错误');
        shakeForm();
        document.getElementById('password').value = '';
      }
    }

    function shakeForm() {
      const container = document.querySelector('.login-container');
      container.classList.add('shake');
      setTimeout(() => {
        container.classList.remove('shake');
      }, 500);
    }

    document.getElementById('username')?.addEventListener('input', hideMessages);
    document.getElementById('password')?.addEventListener('input', hideMessages);
    document.getElementById('ownerId')?.addEventListener('input', hideMessages);
    document.getElementById('ownerPassword')?.addEventListener('input', hideMessages);
  </script>
</body>
</html>
