<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试图片显示</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-image { max-width: 200px; max-height: 150px; margin: 10px 0; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>测试图片显示</h1>
  
  <h2>测试1: 直接使用图片URL</h2>
  <input type="text" id="imageUrl" placeholder="输入图片URL" value="https://via.placeholder.com/200x150">
  <button onclick="testImage()">测试</button>
  <div id="testResult"></div>

  <h2>测试2: 检查localStorage中的图片</h2>
  <button onclick="checkLocalStorageImages()">检查</button>
  <div id="localStorageResult"></div>

  <script>
    function testImage() {
      const url = document.getElementById('imageUrl').value;
      const result = document.getElementById('testResult');
      result.innerHTML = `<img src="${encodeURI(url)}" class="test-image" alt="测试图片">`;
    }

    function checkLocalStorageImages() {
      const result = document.getElementById('localStorageResult');
      const products = localStorage.getItem('products');
      
      if (products) {
        const parsedProducts = JSON.parse(products);
        let html = '<h3>localStorage中的图片:</h3>';
        
        Object.keys(parsedProducts).forEach(ownerId => {
          html += '<h4>业主 ' + ownerId + ':</h4>';
          parsedProducts[ownerId].forEach(product => {
            if (product.image) {
              html += '<p>商品: ' + product.name + '</p>';
              html += '<img src="' + encodeURI(product.image) + '" class="test-image" alt="' + product.name + '">';
              html += '<hr>';
            }
          });
        });
        
        result.innerHTML = html;
      } else {
        result.innerHTML = '<p>无Products数据</p>';
      }
    }

    // 页面加载时自动测试
    window.onload = function() {
      testImage();
    };
  </script>
</body>
</html>
