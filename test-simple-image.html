<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单图片测试</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-image { max-width: 200px; max-height: 150px; margin: 10px 0; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>简单图片测试</h1>
  
  <h2>测试1: 直接图片URL</h2>
  <img src="https://via.placeholder.com/200x150" class="test-image" alt="测试图片1">
  
  <h2>测试2: 编码后的图片URL</h2>
  <img src="https%3A%2F%2Fvia.placeholder.com%2F200x150" class="test-image" alt="测试图片2">
  
  <h2>测试3: 本地存储图片</h2>
  <div id="localStorageTest"></div>

  <script>
    // 测试localStorage存储和读取图片URL
    const testImageUrl = 'https://via.placeholder.com/200x150';
    
    // 存储到localStorage
    localStorage.setItem('testImage', testImageUrl);
    
    // 从localStorage读取
    const storedImageUrl = localStorage.getItem('testImage');
    
    // 渲染图片
    const localStorageTest = document.getElementById('localStorageTest');
    localStorageTest.innerHTML = `<img src="${storedImageUrl}" class="test-image" alt="测试图片3">`;
    
    console.log('测试图片URL:', testImageUrl);
    console.log('从localStorage读取的图片URL:', storedImageUrl);
  </script>
</body>
</html>
