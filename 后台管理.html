<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>后台管理 - 选品系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-image: url('黑色背景.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: #1e293b;
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header h1 i {
      color: white;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: white;
      color: #1e293b;
      border: 1px solid #e2e8f0;
    }

    .btn-secondary:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .btn-danger {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .btn-danger:hover {
      background: #fee2e2;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      padding: 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
    }

    .stat-card h3 {
      font-size: 0.875rem;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
    }

    .stat-icon {
      font-size: 1.5rem;
      color: #667eea;
      margin-bottom: 0.75rem;
    }

    .table-container {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    .table-header {
      background: #f8fafc;
      padding: 1.5rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e293b;
    }

    .search-box {
      position: relative;
    }

    .search-input {
      padding: 0.5rem 2rem 0.5rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      width: 200px;
      transition: all 0.2s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .search-icon {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1rem 1.5rem;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      background: #f8fafc;
      font-weight: 500;
      color: #64748b;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      color: #1e293b;
      font-size: 0.875rem;
    }

    tr:hover {
      background: #f8fafc;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-checked {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .status-unchecked {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .link-cell {
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-cell a {
      color: #667eea;
      text-decoration: none;
    }

    .link-cell a:hover {
      text-decoration: underline;
    }

    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn-sm {
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
      border-radius: 0.375rem;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      transform: translateY(-20px);
      transition: transform 0.3s ease;
    }

    .modal.show .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h3 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e293b;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.25rem;
      color: #64748b;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .modal-close:hover {
      color: #1e293b;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #64748b;
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }

    .empty-state p {
      font-size: 0.875rem;
    }

    .toast {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: white;
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 1000;
      opacity: 0;
      transform: translateX(100%);
      transition: all 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(0);
    }

    .toast-success {
      border-left: 4px solid #10b981;
    }

    .toast-error {
      border-left: 4px solid #ef4444;
    }

    .toast-icon {
      font-size: 1.25rem;
    }

    .toast-success .toast-icon {
      color: #10b981;
    }

    .toast-error .toast-icon {
      color: #ef4444;
    }

    .toast-message {
      font-size: 0.875rem;
      color: #1e293b;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .container {
        padding: 1rem;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .header-actions {
        width: 100%;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .btn {
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
        flex: 1 1 calc(50% - 0.5rem);
        justify-content: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .stat-card {
        padding: 1.25rem;
      }

      .stat-value {
        font-size: 1.75rem;
      }

      .table-container {
        overflow-x: auto;
      }

      th, td {
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
      }

      .link-cell {
        max-width: 150px;
      }

      .modal-content {
        width: 95%;
        padding: 15px;
      }
    }

    @media (max-width: 480px) {
      .header-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        flex: 1 1 100%;
        width: 100%;
      }

      .table-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .search-box {
        width: 100%;
      }

      .search-input {
        width: 100%;
      }

      th, td {
        padding: 0.625rem 0.875rem;
        font-size: 0.7rem;
      }

      .status-badge {
        font-size: 0.7rem;
        padding: 0.2rem 0.5rem;
      }

      .action-buttons {
        flex-direction: column;
        gap: 0.25rem;
      }

      .btn-sm {
        padding: 0.25rem 0.5rem;
        font-size: 0.7rem;
      }
    }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
  <div class="container">
    <div class="header">
      <h1>
        <i class="fas fa-tachometer-alt"></i>
        后台管理
      </h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="refreshData()">
          <i class="fas fa-sync-alt"></i>
          刷新
        </button>
        <button class="btn btn-primary" onclick="exportModificationTime()">
          <i class="fas fa-clock"></i>
          导出修改时间
        </button>
        <button class="btn btn-primary" onclick="exportData()">
          <i class="fas fa-download"></i>
          导出数据
        </button>
        <button class="btn btn-secondary" onclick="openLogModal()">
          <i class="fas fa-history"></i>
          日志
        </button>
        <button class="btn btn-secondary" onclick="openOwnerManagement()">
          <i class="fas fa-users-cog"></i>
          业主账号管理
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">
          <i class="fas fa-sign-out-alt"></i>
          退出
        </button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h3>已选择</h3>
        <div class="stat-value" id="checkedProducts">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-link"></i>
        </div>
        <h3>有链接商品</h3>
        <div class="stat-value" id="linkedProducts">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-users"></i>
        </div>
        <h3>业主数量</h3>
        <div class="stat-value" id="ownerCount">0</div>
      </div>
    </div>

    <div class="table-container">
      <div class="table-header">
        <h2>业主填写内容</h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <div class="search-box">
            <select id="ownerFilter" class="search-input" style="width: 180px;">
              <option value="">所有业主</option>
            </select>
          </div>
          <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索商品...">
            <i class="fas fa-search search-icon"></i>
          </div>
        </div>
      </div>
      <div id="tableContent">
        <!-- 表格内容将通过JavaScript动态生成 -->
      </div>
    </div>
  </div>

  <!-- 编辑模态框 -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑商品</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="editForm" onsubmit="saveEdit(event)">
        <input type="hidden" id="editProductId">
        <div class="form-group">
          <label class="form-label">商品名称</label>
          <input type="text" id="editProductName" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">品牌</label>
          <input type="text" id="editProductBrand" class="form-input" placeholder="品牌名称">
        </div>
        <div class="form-group">
          <label class="form-label">尺寸</label>
          <div style="display: flex; gap: 10px;">
            <div style="flex: 1; position: relative;">
              <input type="number" id="editProductLength" class="form-input" placeholder="长" step="0.1" min="0" style="padding-right: 25px;">
              <span style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #64748b;">cm</span>
            </div>
            <div style="flex: 1; position: relative;">
              <input type="number" id="editProductWidth" class="form-input" placeholder="宽" step="0.1" min="0" style="padding-right: 25px;">
              <span style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #64748b;">cm</span>
            </div>
            <div style="flex: 1; position: relative;">
              <input type="number" id="editProductHeight" class="form-input" placeholder="高" step="0.1" min="0" style="padding-right: 25px;">
              <span style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #64748b;">cm</span>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">图示</label>
          <input type="url" id="editProductImage" class="form-input" placeholder="图片URL">
        </div>
        <div class="form-group">
          <label class="form-label">备注</label>
          <textarea id="editProductNotes" class="form-input" placeholder="备注信息" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">商品链接</label>
          <input type="url" id="editProductLink" class="form-input" placeholder="https://...">
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <select id="editProductStatus" class="form-input">
            <option value="true">已选择</option>
            <option value="false">未选择</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 提示框 -->
  <div id="toast" class="toast">
    <i class="fas fa-check-circle toast-icon"></i>
    <span class="toast-message">操作成功</span>
  </div>

  <!-- 业主账号管理模态框 -->
  <div id="ownerManagementModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h3>业主账号管理</h3>
        <button class="modal-close" onclick="closeOwnerManagement()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">业主ID</label>
          <input type="text" id="newOwnerId" class="form-input" placeholder="请输入业主ID">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="newOwnerPassword" class="form-input" placeholder="请输入密码">
        </div>
        <button class="btn btn-primary" onclick="addOwner()" style="margin-top: 1rem;">
          <i class="fas fa-user-plus"></i>
          添加业主
        </button>
        
        <h4 style="margin-top: 2rem;">现有业主</h4>
        <div id="ownersList" style="margin-top: 1rem;"></div>
      </div>
    </div>
  </div>

  <!-- 日志模态框 -->
  <div id="logModal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h3>操作日志</h3>
        <button class="modal-close" onclick="closeLogModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">日志类型</label>
          <select id="logTypeFilter" class="form-input" onchange="filterLogs()">
            <option value="all">全部</option>
            <option value="login">登录</option>
            <option value="modify">修改</option>
          </select>
        </div>
        <div id="logContent" style="max-height: 500px; overflow-y: auto; margin-top: 1rem;">
          <!-- 日志内容将通过JavaScript动态生成 -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="clearLogs()">清空日志</button>
        <button class="btn btn-secondary" onclick="closeLogModal()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    // MD5 加密函数
    function md5(string) {
      function addUnsigned(x, y) {
        const lsw = (x & 0xffff) + (y & 0xffff);
        const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
        return (msw << 16) | (lsw & 0xffff);
      }

      function rotateLeft(x, n) {
        return (x << n) | (x >>> (32 - n));
      }

      function ff(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(f(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
      }

      function gg(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(g(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
      }

      function hh(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(h(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
      }

      function ii(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(i(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
      }

      function f(x, y, z) {
        return (x & y) | (~x & z);
      }

      function g(x, y, z) {
        return (x & z) | (y & ~z);
      }

      function h(x, y, z) {
        return x ^ y ^ z;
      }

      function i(x, y, z) {
        return y ^ (x | ~z);
      }

      function convertToWordArray(string) {
        let lWordCount;
        const lMessageLength = string.length;
        const lNumberOfWordsTemp1 = lMessageLength + 8;
        const lNumberOfWordsTemp2 = (lNumberOfWordsTemp1 - (lNumberOfWordsTemp1 % 64)) / 64;
        const lNumberOfWords = (lNumberOfWordsTemp2 + 1) * 16;
        const lWordArray = new Array(lNumberOfWords - 1);
        let lBytePosition = 0;
        let lByteCount = 0;
        while (lByteCount < lMessageLength) {
          lWordCount = (lByteCount - (lByteCount % 4)) / 4;
          lBytePosition = (lByteCount % 4) * 8;
          lWordArray[lWordCount] = lWordArray[lWordCount] | (string.charCodeAt(lByteCount) << lBytePosition);
          lByteCount++;
        }
        lWordCount = (lByteCount - (lByteCount % 4)) / 4;
        lBytePosition = (lByteCount % 4) * 8;
        lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition);
        lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
        lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
        return lWordArray;
      }

      function wordToHex(lValue) {
        let wordToHexValue = '', wordToHexValueTemp = '', lByte, lCount;
        for (lCount = 0; lCount <= 3; lCount++) {
          lByte = (lValue >>> (lCount * 8)) & 255;
          wordToHexValueTemp = '0' + lByte.toString(16);
          wordToHexValue = wordToHexValue + wordToHexValueTemp.substr(wordToHexValueTemp.length - 2, 2);
        }
        return wordToHexValue;
      }

      let x = [];
      let k, AA, BB, CC, DD, a, b, c, d;
      const S11 = 7, S12 = 12, S13 = 17, S14 = 22;
      const S21 = 5, S22 = 9, S23 = 14, S24 = 20;
      const S31 = 4, S32 = 11, S33 = 16, S34 = 23;
      const S41 = 6, S42 = 10, S43 = 15, S44 = 21;

      string = unescape(encodeURIComponent(string));
      x = convertToWordArray(string);
      a = 0x67452301; b = 0xEFCDAB89; c = 0x98BADCFE; d = 0x10325476;

      for (k = 0; k < x.length; k += 16) {
        AA = a; BB = b; CC = c; DD = d;
        a = ff(a, b, c, d, x[k + 0], S11, 0xD76AA478);
        d = ff(d, a, b, c, x[k + 1], S12, 0xE8C7B756);
        c = ff(c, d, a, b, x[k + 2], S13, 0x242070DB);
        b = ff(b, c, d, a, x[k + 3], S14, 0xC1BDCEEE);
        a = ff(a, b, c, d, x[k + 4], S11, 0xF57C0FAF);
        d = ff(d, a, b, c, x[k + 5], S12, 0x4787C62A);
        c = ff(c, d, a, b, x[k + 6], S13, 0xA8304613);
        b = ff(b, c, d, a, x[k + 7], S14, 0xFD469501);
        a = ff(a, b, c, d, x[k + 8], S11, 0x698098D8);
        d = ff(d, a, b, c, x[k + 9], S12, 0x8B44F7AF);
        c = ff(c, d, a, b, x[k + 10], S13, 0xFFFF5BB1);
        b = ff(b, c, d, a, x[k + 11], S14, 0x895CD7BE);
        a = ff(a, b, c, d, x[k + 12], S11, 0x6B901122);
        d = ff(d, a, b, c, x[k + 13], S12, 0xFD987193);
        c = ff(c, d, a, b, x[k + 14], S13, 0xA679438E);
        b = ff(b, c, d, a, x[k + 15], S14, 0x49B40821);
        a = gg(a, b, c, d, x[k + 1], S21, 0xF61E2562);
        d = gg(d, a, b, c, x[k + 6], S22, 0xC040B340);
        c = gg(c, d, a, b, x[k + 11], S23, 0x265E5A51);
        b = gg(b, c, d, a, x[k + 0], S24, 0xE9B6C7AA);
        a = gg(a, b, c, d, x[k + 5], S21, 0xD62F105D);
        d = gg(d, a, b, c, x[k + 10], S22, 0x2441453);
        c = gg(c, d, a, b, x[k + 15], S23, 0xD8A1E681);
        b = gg(b, c, d, a, x[k + 4], S24, 0xE7D3FBC8);
        a = gg(a, b, c, d, x[k + 9], S21, 0x21E1CDE6);
        d = gg(d, a, b, c, x[k + 14], S22, 0xC33707D6);
        c = gg(c, d, a, b, x[k + 3], S23, 0xF4D50D87);
        b = gg(b, c, d, a, x[k + 8], S24, 0x455A14ED);
        a = gg(a, b, c, d, x[k + 13], S21, 0xA9E3E905);
        d = gg(d, a, b, c, x[k + 2], S22, 0xFCEFA3F8);
        c = gg(c, d, a, b, x[k + 7], S23, 0x676F02D9);
        b = gg(b, c, d, a, x[k + 12], S24, 0x8D2A4C8A);
        a = hh(a, b, c, d, x[k + 5], S31, 0xFFFA3942);
        d = hh(d, a, b, c, x[k + 8], S32, 0x8771F681);
        c = hh(c, d, a, b, x[k + 11], S33, 0x6D9D6122);
        b = hh(b, c, d, a, x[k + 14], S34, 0xFDE5380C);
        a = hh(a, b, c, d, x[k + 1], S31, 0xA4BEEA44);
        d = hh(d, a, b, c, x[k + 4], S32, 0x4BDECFA9);
        c = hh(c, d, a, b, x[k + 7], S33, 0xF6BB4B60);
        b = hh(b, c, d, a, x[k + 10], S34, 0xBEBFBC70);
        a = hh(a, b, c, d, x[k + 13], S31, 0x289B7EC6);
        d = hh(d, a, b, c, x[k + 0], S32, 0xEAA127FA);
        c = hh(c, d, a, b, x[k + 3], S33, 0xD4EF3085);
        b = hh(b, c, d, a, x[k + 6], S34, 0x4881D05);
        a = hh(a, b, c, d, x[k + 9], S31, 0xD9D4D039);
        d = hh(d, a, b, c, x[k + 12], S32, 0xE6DB99E5);
        c = hh(c, d, a, b, x[k + 15], S33, 0x1FA27CF8);
        b = hh(b, c, d, a, x[k + 2], S34, 0xC4AC5665);
        a = ii(a, b, c, d, x[k + 0], S41, 0xF4292244);
        d = ii(d, a, b, c, x[k + 7], S42, 0x432AFF97);
        c = ii(c, d, a, b, x[k + 14], S43, 0xAB9423A7);
        b = ii(b, c, d, a, x[k + 5], S44, 0xFC93A039);
        a = ii(a, b, c, d, x[k + 12], S41, 0x655B59C3);
        d = ii(d, a, b, c, x[k + 3], S42, 0x8F0CCC92);
        c = ii(c, d, a, b, x[k + 10], S43, 0xFFEFF47D);
        b = ii(b, c, d, a, x[k + 1], S44, 0x85845DD1);
        a = ii(a, b, c, d, x[k + 8], S41, 0x6FA87E4F);
        d = ii(d, a, b, c, x[k + 15], S42, 0xFE2CE6E0);
        c = ii(c, d, a, b, x[k + 6], S43, 0xA3014314);
        b = ii(b, c, d, a, x[k + 13], S44, 0x4E0811A1);
        a = ii(a, b, c, d, x[k + 4], S41, 0xF7537E82);
        d = ii(d, a, b, c, x[k + 11], S42, 0xBD3AF235);
        c = ii(c, d, a, b, x[k + 2], S43, 0x2AD7D2BB);
        b = ii(b, c, d, a, x[k + 9], S44, 0xEB86D391);
        a = addUnsigned(a, AA);
        b = addUnsigned(b, BB);
        c = addUnsigned(c, CC);
        d = addUnsigned(d, DD);
      }

      const temp = wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d);
      return temp.toLowerCase();
    }

    // 全局变量
    var allProducts = {};
    var products = [];
    var currentOwnerFilter = '';

    // 初始化
    document.addEventListener('DOMContentLoaded', async function() {
      initSupabase();
      await loadData();
      populateOwnerFilter();
      renderTable();
      updateStats();

      // 搜索功能
      document.getElementById('searchInput').addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        filterTable(searchTerm);
      });

      // 业主筛选功能
      document.getElementById('ownerFilter').addEventListener('change', function(e) {
        currentOwnerFilter = e.target.value;
        filterTable(document.getElementById('searchInput').value.toLowerCase());
      });
    });

    // 加载数据（优先从 Supabase，回退到 localStorage）
    async function loadData() {
      console.log('Loading data...');
      try {
        // 首先尝试从 Supabase 加载
        if (isSupabaseConfigured()) {
          try {
            allProducts = await getAllProducts();
            console.log('Loaded from Supabase:', allProducts);
          } catch (e) {
            console.error('从 Supabase 加载失败，回退到 localStorage:', e);
            // 回退到 localStorage
            allProducts = JSON.parse(localStorage.getItem('products')) || {};
          }
        } else {
          // 未配置 Supabase，使用 localStorage
          allProducts = JSON.parse(localStorage.getItem('products')) || {};
        }
        
        console.log('Parsed allProducts:', allProducts);
        console.log('Type:', typeof allProducts);
        
        // 手动构建products数组
        products = [];
        if (typeof allProducts === 'object' && allProducts !== null) {
          Object.keys(allProducts).forEach(ownerId => {
            console.log('Processing owner:', ownerId);
            const ownerProducts = allProducts[ownerId];
            if (Array.isArray(ownerProducts)) {
              console.log('Owner has', ownerProducts.length, 'products');
              ownerProducts.forEach(product => {
                // 为旧数据添加默认的修改时间
                if (!product.updatedAt) {
                  product.updatedAt = new Date().toISOString();
                }
                products.push({
                  ...product,
                  ownerId: ownerId
                });
              });
            }
          });
        }
        console.log('Loaded products:', products);
      } catch (error) {
        console.error('Error loading data:', error);
        allProducts = {};
        products = [];
      }
    }

    // 获取所有业主的所有商品
    function getAllProducts() {
      let all = [];
      console.log('allProducts:', allProducts);
      console.log('Type of allProducts:', typeof allProducts);
      
      // 检查allProducts的类型
      if (typeof allProducts === 'object' && allProducts !== null) {
        if (Array.isArray(allProducts)) {
          console.log('allProducts is an array, converting to object...');
          // 如果是数组，可能是旧格式，转换为新格式
          const newAllProducts = {};
          allProducts.forEach(product => {
            const ownerId = product.ownerId || 'default';
            if (!newAllProducts[ownerId]) {
              newAllProducts[ownerId] = [];
            }
            newAllProducts[ownerId].push(product);
          });
          allProducts = newAllProducts;
          // 保存转换后的数据
          localStorage.setItem('products', JSON.stringify(allProducts));
          console.log('Converted to object:', allProducts);
        } else {
          console.log('allProducts is an object');
          // 处理对象格式
          const keys = Object.keys(allProducts);
          console.log('Object keys:', keys);
          keys.forEach(ownerId => {
            console.log('Processing owner:', ownerId);
            console.log('Type of owner data:', typeof allProducts[ownerId]);
            console.log('Is array:', Array.isArray(allProducts[ownerId]));
            if (Array.isArray(allProducts[ownerId])) {
              console.log('Owner has', allProducts[ownerId].length, 'products');
              allProducts[ownerId].forEach(product => {
                all.push({
                  ...product,
                  ownerId: ownerId
                });
              });
            } else {
              console.log('Owner data is not an array:', allProducts[ownerId]);
            }
          });
        }
      } else {
        console.log('allProducts is not an object or is null');
      }
      
      console.log('All products:', all);
      return all;
    }

    // 填充业主筛选下拉框
    function populateOwnerFilter() {
      const ownerFilter = document.getElementById('ownerFilter');
      console.log('Populating owner filter with:', allProducts);
      const owners = Object.keys(allProducts);
      console.log('Owners found:', owners);
      
      // 清空现有选项（保留"所有业主"）
      ownerFilter.innerHTML = '<option value="">所有业主</option>';
      
      // 添加业主选项
      owners.forEach(ownerId => {
        const option = document.createElement('option');
        option.value = ownerId;
        option.textContent = ownerId;
        ownerFilter.appendChild(option);
      });
    }

    // 保存数据（同时保存到 Supabase 和 localStorage）
    async function saveData() {
      localStorage.setItem('products', JSON.stringify(allProducts));
      
      if (isSupabaseConfigured()) {
        try {
          for (const [ownerId, ownerProducts] of Object.entries(allProducts)) {
            await saveProducts(ownerId, ownerProducts);
          }
        } catch (e) {
          console.error('保存到 Supabase 失败:', e);
        }
      }
    }

    // 刷新数据
    async function refreshData() {
      await loadData();
      populateOwnerFilter();
      renderTable();
      updateStats();
      showToast('数据已刷新', 'success');
    }

    // 更新统计信息
    function updateStats() {
      const checked = products.filter(p => p.checked).length;
      const linked = products.filter(p => p.link && p.link.trim() !== '').length;
      const uniqueOwners = new Set(products.map(p => p.ownerId)).size;

      document.getElementById('checkedProducts').textContent = checked;
      document.getElementById('linkedProducts').textContent = linked;
      document.getElementById('ownerCount').textContent = uniqueOwners;
    }

    // 格式化时间函数
    function formatTime(isoString) {
      if (!isoString) return '-';
      try {
        const date = new Date(isoString);
        if (isNaN(date.getTime())) return '-';
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const seconds = String(date.getSeconds()).padStart(2, '0');
        return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
      } catch (error) {
        return '-';
      }
    }

    // 渲染表格
    function renderTable(filteredProducts = null) {
      const tableContent = document.getElementById('tableContent');
      const data = filteredProducts || products;

      if (data.length === 0) {
        tableContent.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-folder-open"></i>
            <h3>暂无商品数据</h3>
            <p>业主还未添加任何商品</p>
          </div>
        `;
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>修改时间</th>
              <th>业主ID</th>
              <th>商品名称</th>
              <th>品牌</th>
              <th>尺寸</th>
              <th>图示</th>
              <th>备注</th>
              <th>商品链接</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      data.forEach(product => {
        const statusClass = product.checked ? 'status-checked' : 'status-unchecked';
        const statusText = product.checked ? '已选择' : '未选择';
        const formattedTime = formatTime(product.updatedAt);
        const sizeText = (product.size?.length || product.size?.width || product.size?.height) ? 
          `${product.size?.length ? `长 ${product.size.length}cm` : ''} ${product.size?.width ? `× 宽 ${product.size.width}cm` : ''} ${product.size?.height ? `× 高 ${product.size.height}cm` : ''}`.trim() : '-';

        html += `
          <tr data-product-id="${product.id}" data-owner-id="${product.ownerId}">
            <td>${formattedTime}</td>
            <td><span style="font-weight: 500; color: #667eea;">${product.ownerId}</span></td>
            <td>${product.name}</td>
            <td>${product.brand || '-'}</td>
            <td>${sizeText}</td>
            <td>${product.image ? `<img src="${product.image}" style="max-width: 80px; max-height: 60px;" alt="商品图示">` : '-'}</td>
            <td>${product.notes || '-'}</td>
            <td class="link-cell">
              ${product.link ? `<a href="${product.link}" target="_blank">${product.link}</a>` : '-'}
            </td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            <td>
              <div class="action-buttons">
                <button class="btn btn-sm btn-secondary" onclick="editProduct(${product.id}, '${product.ownerId}')">
                  <i class="fas fa-edit"></i>
                  编辑
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${product.id}, '${product.ownerId}')">
                  <i class="fas fa-trash"></i>
                  删除
                </button>
              </div>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      tableContent.innerHTML = html;
    }

    // 过滤表格
    function filterTable(searchTerm) {
      let filtered = products;

      // 先按业主筛选
      if (currentOwnerFilter) {
        filtered = filtered.filter(product => product.ownerId === currentOwnerFilter);
      }

      // 再按搜索词筛选
      if (searchTerm) {
        filtered = filtered.filter(product => 
          product.name.toLowerCase().includes(searchTerm) ||
          (product.link && product.link.toLowerCase().includes(searchTerm)) ||
          product.ownerId.toLowerCase().includes(searchTerm)
        );
      }

      renderTable(filtered);
    }

    // 编辑商品
    function editProduct(id, ownerId) {
      const product = allProducts[ownerId].find(p => p.id === id);
      if (!product) return;

      document.getElementById('editProductId').value = product.id;
      document.getElementById('editProductName').value = product.name;
      document.getElementById('editProductBrand').value = product.brand || '';
      document.getElementById('editProductLength').value = product.size?.length || '';
      document.getElementById('editProductWidth').value = product.size?.width || '';
      document.getElementById('editProductHeight').value = product.size?.height || '';
      document.getElementById('editProductImage').value = product.image || '';
      document.getElementById('editProductNotes').value = product.notes || '';
      document.getElementById('editProductLink').value = product.link || '';
      document.getElementById('editProductStatus').value = product.checked.toString();
      
      // 存储当前编辑的业主ID
      document.getElementById('editModal').dataset.ownerId = ownerId;

      document.getElementById('editModal').classList.add('show');
    }

    // 保存编辑
    async function saveEdit(event) {
      event.preventDefault();

      const id = parseInt(document.getElementById('editProductId').value);
      const ownerId = document.getElementById('editModal').dataset.ownerId;
      const name = document.getElementById('editProductName').value.trim();
      const brand = document.getElementById('editProductBrand').value.trim();
      const length = document.getElementById('editProductLength').value.trim();
      const width = document.getElementById('editProductWidth').value.trim();
      const height = document.getElementById('editProductHeight').value.trim();
      const image = document.getElementById('editProductImage').value.trim();
      const notes = document.getElementById('editProductNotes').value.trim();
      const link = document.getElementById('editProductLink').value.trim();
      const checked = document.getElementById('editProductStatus').value === 'true';

      if (!name) {
        showToast('请输入商品名称', 'error');
        return;
      }

      const productIndex = allProducts[ownerId].findIndex(p => p.id === id);
      if (productIndex !== -1) {
        allProducts[ownerId][productIndex] = {
          ...allProducts[ownerId][productIndex],
          name,
          brand,
          size: {
            length,
            width,
            height
          },
          image,
          notes,
          link,
          checked,
          updatedAt: new Date().toISOString()
        };

        await saveData();
        await loadData();
        renderTable();
        updateStats();
        closeModal();
        showToast('商品已更新', 'success');
        
        // 记录修改日志
        logModify(`修改了业主 ${ownerId} 的商品: ${name}`);
      }
    }

    // 删除商品
    async function deleteProduct(id, ownerId) {
      if (confirm('确定要删除这个商品吗？')) {
        const productToDelete = allProducts[ownerId].find(p => p.id === id);
        const productName = productToDelete ? productToDelete.name : '未知商品';
        
        allProducts[ownerId] = allProducts[ownerId].filter(p => p.id !== id);
        await saveData();
        await loadData();
        renderTable();
        updateStats();
        showToast('商品已删除', 'success');
        
        // 记录修改日志
        logModify(`删除了业主 ${ownerId} 的商品: ${productName}`);
      }
    }

    // 关闭模态框
    function closeModal() {
      document.getElementById('editModal').classList.remove('show');
    }

    // 导出修改时间
    function exportModificationTime() {
      // 获取当前筛选条件下的数据
      let filteredData = products;
      
      // 如果有业主筛选，只导出该业主的数据
      if (currentOwnerFilter) {
        filteredData = filteredData.filter(product => product.ownerId === currentOwnerFilter);
      }
      
      if (filteredData.length === 0) {
        showToast('没有数据可导出', 'error');
        return;
      }

      // 准备导出数据
      const exportData = filteredData.map(product => ({
        '业主ID': product.ownerId,
        '商品名称': product.name,
        '修改时间': formatTime(product.updatedAt)
      }));

      // 创建工作簿
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.json_to_sheet(exportData);
      
      // 设置列宽
      ws['!cols'] = [
        { wch: 15 }, // 业主ID
        { wch: 30 }, // 商品名称
        { wch: 20 }  // 修改时间
      ];

      // 添加工作表到工作簿
      XLSX.utils.book_append_sheet(wb, ws, '修改时间数据');

      // 生成文件名
      let fileName = `修改时间数据_${new Date().toISOString().split('T')[0]}`;
      if (currentOwnerFilter) {
        fileName += `_${currentOwnerFilter}`;
      }
      fileName += '.xlsx';

      // 导出Excel文件
      XLSX.writeFile(wb, fileName);

      showToast('修改时间数据已导出', 'success');
    }

    // 显示提示框
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.querySelector('.toast-message').textContent = message;
      toast.className = `toast ${type === 'success' ? 'toast-success' : 'toast-error'}`;
      
      setTimeout(() => {
        toast.classList.add('show');
      }, 100);

      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // 点击模态框外部关闭
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // 打开业主账号管理
    async function openOwnerManagement() {
      await displayOwners();
      document.getElementById('ownerManagementModal').classList.add('show');
    }

    // 关闭业主账号管理
    function closeOwnerManagement() {
      document.getElementById('ownerManagementModal').classList.remove('show');
      document.getElementById('newOwnerId').value = '';
      document.getElementById('newOwnerPassword').value = '';
    }

    // 添加业主
    async function addOwner() {
      const ownerId = document.getElementById('newOwnerId').value.trim();
      const password = document.getElementById('newOwnerPassword').value;
      
      if (!ownerId || !password) {
        showToast('请输入业主ID和密码', 'error');
        return;
      }
      
      // 获取现有业主信息
      let ownerCredentials = {};
      if (isSupabaseConfigured()) {
        try {
          ownerCredentials = await getOwnerCredentials();
        } catch (e) {
          console.error('从 Supabase 获取业主失败:', e);
          ownerCredentials = JSON.parse(localStorage.getItem('ownerCredentials')) || {};
        }
      } else {
        ownerCredentials = JSON.parse(localStorage.getItem('ownerCredentials')) || {};
      }
      
      // 检查业主ID是否已存在
      if (ownerCredentials[ownerId]) {
        showToast('该业主ID已存在', 'error');
        return;
      }
      
      // 加密密码
      const passwordHash = md5(password);
      
      // 添加业主
      ownerCredentials[ownerId] = passwordHash;
      localStorage.setItem('ownerCredentials', JSON.stringify(ownerCredentials));
      
      if (isSupabaseConfigured()) {
        try {
          await addOwnerCredential(ownerId, passwordHash);
        } catch (e) {
          console.error('保存到 Supabase 失败:', e);
        }
      }
      
      // 初始化商品数据
      if (!allProducts[ownerId]) {
        allProducts[ownerId] = [];
      }
      localStorage.setItem('products', JSON.stringify(allProducts));
      
      showToast('业主添加成功');
      document.getElementById('newOwnerId').value = '';
      document.getElementById('newOwnerPassword').value = '';
      
      // 更新业主列表
      displayOwners();
      
      // 记录修改日志
      logModify(`添加了新业主: ${ownerId}`);
    }

    // 删除业主
    async function deleteOwner(ownerId) {
      if (confirm(`确定要删除业主 ${ownerId} 吗？`)) {
        // 获取现有业主信息
        let ownerCredentials = JSON.parse(localStorage.getItem('ownerCredentials')) || {};
        
        // 删除业主
        delete ownerCredentials[ownerId];
        localStorage.setItem('ownerCredentials', JSON.stringify(ownerCredentials));
        
        if (isSupabaseConfigured()) {
          try {
            await deleteOwnerCredential(ownerId);
          } catch (e) {
            console.error('从 Supabase 删除业主失败:', e);
          }
        }
        
        // 删除业主商品数据
        delete allProducts[ownerId];
        localStorage.setItem('products', JSON.stringify(allProducts));
        
        showToast('业主删除成功');
        
        // 更新业主列表
        displayOwners();
        
        // 记录修改日志
        logModify(`删除了业主: ${ownerId}`);
      }
    }

    // 显示现有业主
    async function displayOwners() {
      let ownerCredentials = {};
      if (isSupabaseConfigured()) {
        try {
          ownerCredentials = await getOwnerCredentials();
        } catch (e) {
          console.error('从 Supabase 获取业主失败:', e);
          ownerCredentials = JSON.parse(localStorage.getItem('ownerCredentials')) || {};
        }
      } else {
        ownerCredentials = JSON.parse(localStorage.getItem('ownerCredentials')) || {};
      }
      
      const ownersList = document.getElementById('ownersList');
      
      if (Object.keys(ownerCredentials).length === 0) {
        ownersList.innerHTML = '<p>暂无业主</p>';
        return;
      }
      
      let html = '<ul style="list-style: none; padding: 0;">';
      Object.keys(ownerCredentials).forEach(ownerId => {
        html += `<li style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee;">
                  <span>${ownerId}</span>
                  <button class="btn btn-sm btn-danger" onclick="deleteOwner('${ownerId}')">
                    <i class="fas fa-trash"></i>
                    删除
                  </button>
                </li>`;
      });
      html += '</ul>';
      ownersList.innerHTML = html;
    }

    // 点击业主管理模态框外部关闭
    document.getElementById('ownerManagementModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeOwnerManagement();
      }
    });

    // 日志相关函数
    
    // 记录登录日志
    async function logLogin() {
      const log = {
        type: 'login',
        timestamp: new Date().toISOString(),
        action: '管理员登录后台管理页面'
      };
      await saveLog(log);
    }

    // 记录修改日志
    async function logModify(action) {
      const log = {
        type: 'modify',
        timestamp: new Date().toISOString(),
        action: action
      };
      await saveLog(log);
    }

    // 保存日志（同时保存到 Supabase 和 localStorage）
    async function saveLog(log) {
      let logs = JSON.parse(localStorage.getItem('adminLogs')) || [];
      logs.push(log);
      // 限制日志数量，最多保存100条
      if (logs.length > 100) {
        logs = logs.slice(-100);
      }
      localStorage.setItem('adminLogs', JSON.stringify(logs));
      
      if (isSupabaseConfigured()) {
        try {
          await addAdminLog(log);
        } catch (e) {
          console.error('保存日志到 Supabase 失败:', e);
        }
      }
    }

    // 打开日志模态框
    async function openLogModal() {
      await displayLogs();
      document.getElementById('logModal').classList.add('show');
    }

    // 关闭日志模态框
    function closeLogModal() {
      document.getElementById('logModal').classList.remove('show');
    }

    // 显示日志
    async function displayLogs(filterType = 'all') {
      const logContent = document.getElementById('logContent');
      let logs = [];
      
      if (isSupabaseConfigured()) {
        try {
          logs = await getAdminLogs();
        } catch (e) {
          console.error('从 Supabase 获取日志失败:', e);
          logs = JSON.parse(localStorage.getItem('adminLogs')) || [];
        }
      } else {
        logs = JSON.parse(localStorage.getItem('adminLogs')) || [];
      }
      
      // 过滤日志
      const filteredLogs = filterType === 'all' ? logs : logs.filter(log => log.type === filterType);
      
      if (filteredLogs.length === 0) {
        logContent.innerHTML = '<p>暂无日志记录</p>';
        return;
      }
      
      // 按时间倒序排列
      const sortedLogs = filteredLogs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      
      let html = '<ul style="list-style: none; padding: 0;">';
      sortedLogs.forEach(log => {
        const date = new Date(log.timestamp);
        const formattedDate = date.toLocaleString('zh-CN');
        const typeClass = log.type === 'login' ? 'status-checked' : 'status-unchecked';
        const typeText = log.type === 'login' ? '登录' : '修改';
        
        html += `
          <li style="display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #eee;">
            <div>
              <span class="status-badge ${typeClass}">${typeText}</span>
              <p style="margin: 5px 0;">${log.action}</p>
              <p style="font-size: 0.8rem; color: #64748b;">${formattedDate}</p>
            </div>
          </li>
        `;
      });
      html += '</ul>';
      
      logContent.innerHTML = html;
    }

    // 过滤日志
    function filterLogs() {
      const filterType = document.getElementById('logTypeFilter').value;
      displayLogs(filterType);
    }

    // 清空日志
    async function clearLogs() {
      if (confirm('确定要清空所有日志吗？')) {
        localStorage.removeItem('adminLogs');
        
        if (isSupabaseConfigured()) {
          try {
            await clearAdminLogs();
          } catch (e) {
            console.error('清空 Supabase 日志失败:', e);
          }
        }
        
        await displayLogs();
        showToast('日志已清空', 'success');
      }
    }

    // 点击日志模态框外部关闭
    document.getElementById('logModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeLogModal();
      }
    });

    // 页面加载时记录登录日志
    logLogin();
  </script>
</body>
</html>
